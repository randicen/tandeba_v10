<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Worgena — Configurar firma</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      max-width: 600px;
      width: 100%;
    }
    h1 { font-size: 22px; margin-bottom: 8px; color: #1a1a1a; }
    .subtitle { color: #666; font-size: 14px; margin-bottom: 24px; }
    .options { display: flex; gap: 16px; margin-bottom: 24px; }
    .option {
      flex: 1;
      padding: 20px;
      border: 2px solid #e5e5e5;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s ease;
      background: white;
    }
    .option:hover { border-color: #1a1a2e; }
    .option.active { border-color: #1a1a2e; background: #fafaff; }
    .option h2 { font-size: 16px; margin-bottom: 6px; }
    .option p { color: #666; font-size: 13px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: #333; }
    .form-group input { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
    .form-group input:focus { outline: none; border-color: #1a1a2e; }
    .btn {
      display: inline-block;
      padding: 10px 20px;
      background: #1a1a2e;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
    }
    .btn:hover { background: #2a2a4e; }
    .btn:disabled { background: #999; cursor: not-allowed; }
    .error { color: #dc2626; font-size: 13px; margin-top: 8px; }
    .success { color: #059669; font-size: 13px; margin-top: 8px; }
    .hidden { display: none; }
    .invite-link { font-size: 12px; color: #666; word-break: break-all; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Configura tu firma</h1>
    <p class="subtitle">¿Cómo quieres empezar? Puedes crear tu propia firma o unirte a una existente.</p>

    <div class="options">
      <div class="option" id="opt-create" onclick="showCreate()">
        <h2>Crear firma</h2>
        <p>Si eres el primero o quieres crear una firma nueva.</p>
      </div>
      <div class="option" id="opt-join" onclick="showJoin()">
        <h2>Unirse con código</h2>
 <p>Si te invitaron a una firma existente.</p>
      </div>
    </div>

    <!-- Form: Create -->
    <div id="form-create" class="hidden">
      <div class="form-group">
        <label for="firm-name">Nombre de la firma</label>
        <input type="text" id="firm-name" placeholder="Ej: Pérez & Asociados" />
      </div>
      <div class="form-group">
        <label for="firm-nit">NIT (opcional)</label>
        <input type="text" id="firm-nit" placeholder="900.123.456-7" />
      </div>
      <button class="btn" id="btn-create" onclick="createFirm()">Crear firma</button>
      <div id="create-error" class="error hidden"></div>
    </div>

    <!-- Form: Join -->
    <div id="form-join" class="hidden">
      <div class="form-group">
        <label for="invite-token">Código de invitación</label>
        <input type="text" id="invite-token" placeholder="Pega el código aquí" />
      </div>
      <button class="btn" id="btn-join" onclick="joinFirm()">Unirse</button>
      <div id="join-error" class="error hidden"></div>
    </div>

    <div id="success-msg" class="success hidden"></div>
  </div>

  <script>
    function showCreate() {
      document.getElementById("opt-create").classList.add("active");
      document.getElementById("opt-join").classList.remove("active");
      document.getElementById("form-create").classList.remove("hidden");
      document.getElementById("form-join").classList.add("hidden");
      document.getElementById("success-msg").classList.add("hidden");
    }
    function showJoin() {
      document.getElementById("opt-join").classList.add("active");
      document.getElementById("opt-create").classList.remove("active");
      document.getElementById("form-join").classList.remove("hidden");
      document.getElementById("form-create").classList.add("hidden");
      document.getElementById("success-msg").classList.add("hidden");
    }
    function showError(id, msg) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.classList.remove("hidden");
    }
    function hideError(id) {
      document.getElementById(id).classList.add("hidden");
    }
    function showSuccess(msg) {
      const el = document.getElementById("success-msg");
      el.textContent = msg;
      el.classList.remove("hidden");
    }

    async function createFirm() {
      const btn = document.getElementById("btn-create");
      const name = document.getElementById("firm-name").value.trim();
      const nit = document.getElementById("firm-nit").value.trim();
      if (!name) {
        showError("create-error", "El nombre es obligatorio.");
        return;
      }
      hideError("create-error");
      btn.disabled = true;
      try {
        const res = await fetch("/api/firms", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name, nit: nit || undefined }),
          credentials: "include",
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({ error: res.statusText }));
          showError("create-error", err.error ?? `Error ${res.status}`);
          btn.disabled = false;
          return;
        }
        // Set activeFirmId via auto-set
        await fetch("/api/firms/auto-set-active", {
          method: "POST",
          credentials: "include",
        });
        showSuccess("Firma creada. Redirigiendo...");
        setTimeout(() => { window.location.href = "/"; }, 1000);
      } catch (e: any) {
        showError("create-error", e.message ?? "Error de red");
        btn.disabled = false;
      }
    }

    async function joinFirm() {
      const btn = document.getElementById("btn-join");
      const token = document.getElementById("invite-token").value.trim();
      if (!token) {
        showError("join-error", "El código es obligatorio.");
        return;
      }
      hideError("join-error");
      btn.disabled = true;
      try {
        const res = await fetch("/api/firms/join", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token }),
          credentials: "include",
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({ error: res.statusText }));
          showError("join-error", err.error ?? `Error ${res.status}`);
          btn.disabled = false;
          return;
        }
        await fetch("/api/firms/auto-set-active", {
          method: "POST",
          credentials: "include",
        });
        showSuccess("Te uniste a la firma. Redirigiendo...");
        setTimeout(() => { window.location.href = "/"; }, 1000);
      } catch (e: any) {
        showError("join-error", e.message ?? "Error de red");
        btn.disabled = false;
      }
    }

    // Si la URL tiene ?token=XXX, preselecciona "Unirse" y rellena el input.
    const urlParams = new URLSearchParams(window.location.search);
    const inviteToken = urlParams.get("token");
    if (inviteToken) {
      showJoin();
      document.getElementById("invite-token").value = inviteToken;
    }
  </script>
</body>
</html>
